name: Open Draft Security Advisory

on:
  workflow_dispatch:
    inputs:
      summary:
        description: "Short summary of the vulnerability"
        required: true
        type: string
      description:
        description: "Detailed technical description and impact"
        required: true
        type: string
      ecosystem:
        description: "Package ecosystem"
        required: true
        default: "maven"
        type: choice
        options:
          - maven
          - npm
          - pip
          - rubygems
          - composer
          - nuget
          - crates.io
          - go
          - pub
          - other
      package_name:
        description: "Optional package name (leave blank for repository-level advisory)"
        required: false
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  open-draft-advisory:
    runs-on: ubuntu-latest

    steps:
      - name: Open Draft Advisory
        uses: actions/github-script@v7
        with:
          script: |
            const summary = core.getInput("summary", { required: true }).trim();
            const description = core.getInput("description", { required: true }).trim();
            const ecosystem = core.getInput("ecosystem", { required: true }).trim();
            const packageNameRaw = core.getInput("package_name").trim();

            const payload = {
              summary,
              description,
              vulnerabilities: [
                {
                  package: {
                    ecosystem,
                  },
                },
              ],
            };

            if (packageNameRaw.length > 0) {
              payload.vulnerabilities[0].package.name = packageNameRaw;
            }

            const response = await github.request("POST /repos/{owner}/{repo}/security-advisories", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ...payload,
            });

            core.info(`Draft advisory created: ${response.data.html_url}`);
            core.setOutput("advisory_url", response.data.html_url);
