name: Publish Orbinex NPM Packages

on:
  workflow_dispatch:
    inputs:
      registry:
        description: "Target registry"
        required: true
        default: both
        type: choice
        options:
          - github
          - npmjs
          - both

permissions:
  contents: read
  packages: write

jobs:
  publish-github-packages:
    name: Publish npm to GitHub Packages
    if: ${{ github.event.inputs.registry == 'github' || github.event.inputs.registry == 'both' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orbinex-npm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          scope: '@galihru'

      - name: Ensure GH_TOKEN is configured
        run: |
          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
            echo "GH_TOKEN is not configured in repository secrets."
            echo "Set GH_TOKEN with package write scope to publish to npm.pkg.github.com."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify GitHub npm identity
        run: npm whoami --registry=https://npm.pkg.github.com
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Publish
        run: npm publish --registry=https://npm.pkg.github.com --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_TOKEN }}

  publish-npmjs:
    name: Publish to npmjs
    if: ${{ github.event.inputs.registry == 'npmjs' || github.event.inputs.registry == 'both' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orbinex-npm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          scope: '@galihru'

      - name: Ensure NPM_TOKEN is configured
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "NPM_TOKEN is not configured in repository secrets."
            echo "Set NPM_TOKEN to publish to registry.npmjs.org."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
