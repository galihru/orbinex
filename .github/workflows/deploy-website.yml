name: Deploy Training Website

on:
  push:
    branches:
      - main
    paths:
      - website/**
      - docs/**
      - README.md
      - .github/workflows/deploy-website.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare Website Artifact
        run: |
          mkdir -p website/reference
          cp docs/*.md website/reference/
          cp README.md website/reference/README-repo.md

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: website

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
