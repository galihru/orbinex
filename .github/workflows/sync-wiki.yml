name: Sync Wiki

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Prepare Wiki Repository
        id: prepare_wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
        run: |
          TOKEN="$WIKI_PUSH_TOKEN"
          if [ -z "$TOKEN" ]; then
            TOKEN="$GITHUB_TOKEN"
          fi

          WIKI_URL="https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git"

          if [ -d wiki ]; then
            rm -rf wiki
          fi

          if git ls-remote "$WIKI_URL" >/dev/null 2>&1; then
            git clone "$WIKI_URL" wiki
            echo "wiki_remote_ready=true" >> "$GITHUB_OUTPUT"
          else
            mkdir -p wiki
            cd wiki
            git init
            git remote add origin "$WIKI_URL"
            cd ..
            echo "wiki_remote_ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Wiki git endpoint is not ready yet. Workflow will still prepare content and retry push automatically on future runs."
          fi

      - name: Generate Wiki Pages
        run: |
          cp README.md wiki/Home.md
          cp CONTRIBUTING.md wiki/Contributing.md
          cp .github/CODE_OF_CONDUCT.md wiki/Code-of-Conduct.md
          cp .github/SECURITY.md wiki/Security-Policy.md
          cp CITATION.cff wiki/Citation.cff

          for file in docs/*.md; do
            name=$(basename "$file")
            cp "$file" "wiki/${name}"
          done

          cat > wiki/_Sidebar.md <<'EOF'
          - [Home](Home)
          - [Contributing](Contributing)
          - [Code of Conduct](Code-of-Conduct)
          - [Security Policy](Security-Policy)
          - [Citation](Citation)
          - [Dependencies](DEPENDENCIES)
          - [Formulations](FORMULATIONS)
          - [Installation](INSTALLATION)
          - [Integration](INTEGRATION)
          - [References](REFERENCES)
          - [Usage](USAGE)
          EOF

      - name: Commit and Push Wiki
        run: |
          cd wiki
          git add .
          if git diff --staged --quiet; then
            echo "No wiki changes to publish."
            exit 0
          fi
          git commit -m "docs(wiki): sync from ${GITHUB_SHA::7}"

          if git push origin HEAD:master; then
            echo "Wiki sync completed."
          else
            echo "::warning::Could not push to wiki repository yet. If wiki page remains empty, open the Wiki tab once in GitHub and this workflow will retry automatically on the next push."
          fi
