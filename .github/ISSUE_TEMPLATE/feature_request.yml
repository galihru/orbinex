name: Feature request
description: Propose a new capability or improvement for Orbinex.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please share enough context for design and prioritization.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the scientific or engineering pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be added or changed?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you evaluated.

  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Who benefits and how?

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked for existing issues and discussions.
          required: true
        - label: I am willing to help with implementation.
          required: false
