name: Bug report
description: Report a reproducible defect in Orbinex modules.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail so we can reproduce and fix it quickly.

  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What went wrong?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Run ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Affected version
      description: Example: 0.1.0
      placeholder: 0.1.0
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Java version, Scala/Mill context, and any other relevant details.
      placeholder: Windows 11, Java 21, Mill 1.x

  - type: textarea
    id: logs
    attributes:
      label: Logs or stack traces
      description: Paste relevant logs.
      render: shell
